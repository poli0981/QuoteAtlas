# QuoteAtlas release (docs/12 §3, docs/13). Runs on a v* tag: build + sign the
# Android APK, then cut a GitHub Release with the APK + SHA256SUMS. Web is deployed
# by the Cloudflare Workers Builds git integration on the main push (not from here —
# the account has no classic Pages project to `wrangler pages deploy` into). Desktop
# bundles + the minisign updater are out of scope this round. All actions SHA-pinned.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1 (stable)
        with:
          toolchain: stable
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run sync:version
      - name: Write signing config from secrets
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
          cat > src-tauri/gen/android/app/keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
      - name: Build signed arm64 APK
        run: NDK_HOME="$ANDROID_NDK_LATEST_HOME" npm run tauri:android:build
      - name: Rename APK to the stable (Obtainium-friendly) pattern
        run: |
          version="${GITHUB_REF_NAME#v}"
          apk=$(find src-tauri/gen/android/app/build/outputs/apk -name '*-release.apk' ! -name '*unsigned*' | head -1)
          test -n "$apk" || { echo "no signed release APK found"; exit 1; }
          cp "$apk" "quoteatlas-v${version}-android-arm64.apk"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-apk
          path: quoteatlas-v*-android-arm64.apk
          retention-days: 7
          if-no-files-found: error

  release:
    needs: [android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-apk
      - name: Generate SHA256SUMS
        run: sha256sum quoteatlas-v*-android-arm64.apk > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            quoteatlas-v*-android-arm64.apk
            SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
